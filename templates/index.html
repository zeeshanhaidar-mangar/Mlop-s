<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Species Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #06b6d4;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 184, 212, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #34d399, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            display: none;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4ade80;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iris Predictor</h1>
        <p class="subtitle">Enter flower dimensions to predict species</p>
        
        <form id="predictionForm">
            <div class="form-group">
                <label for="sepal_length">Sepal Length (cm)</label>
                <input type="number" id="sepal_length" step="0.1" required placeholder="e.g. 5.1">
            </div>
            <div class="form-group">
                <label for="sepal_width">Sepal Width (cm)</label>
                <input type="number" id="sepal_width" step="0.1" required placeholder="e.g. 3.5">
            </div>
            <div class="form-group">
                <label for="petal_length">Petal Length (cm)</label>
                <input type="number" id="petal_length" step="0.1" required placeholder="e.g. 1.4">
            </div>
            <div class="form-group">
                <label for="petal_width">Petal Width (cm)</label>
                <input type="number" id="petal_width" step="0.1" required placeholder="e.g. 0.2">
            </div>
            
            <button type="submit" id="submitBtn">
                <span id="btnText">Predict Species</span>
                <div id="loader" class="loader"></div>
            </button>
        </form>

        <div id="resultContainer" class="result-container">
            <p class="result-label">Predicted Species</p>
            <p id="resultValue" class="result-value"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('resultContainer');
        const resultValue = document.getElementById('resultValue');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // UI State: Loading
            btnText.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;
            resultContainer.style.display = 'none';

            const formData = {
                sepal_length: document.getElementById('sepal_length').value,
                sepal_width: document.getElementById('sepal_width').value,
                petal_length: document.getElementById('petal_length').value,
                petal_width: document.getElementById('petal_width').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    resultValue.innerText = data.prediction;
                    resultContainer.style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Connection error. Is the server running?');
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
